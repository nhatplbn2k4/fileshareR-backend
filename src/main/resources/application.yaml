spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/document_management}
    username: ${DATABASE_USERNAME:admin}
    password: ${DATABASE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Thymeleaf Configuration
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

server:
  port: 8080

# JWT Configuration
filesharer:
  jwt:
    # Base64 encoded secret key (minimum 512 bits for HS512)
    base64-secret: ${JWT_SECRET:Y2xhdWRlLWNvZGUtZmlsZXNoYXJlci1qd3Qtc2VjcmV0LWtleS0yMDI0LXZlcnktc2VjdXJlLWtleS1mb3ItaHM1MTItYWxnb3JpdGhtLW1pbmltdW0tNTEyLWJpdHM=}
    # Access token validity: 24 hours
    access-token-validity-in-seconds: 86400
    # Refresh token validity: 100 days
    refresh-token-validity-in-seconds: 8640000

  # File Storage Configuration
  file-storage:
    upload-dir: ${FILE_UPLOAD_DIR:uploads}
    allowed-extensions: pdf,docx,doc,txt
    max-file-size: 52428800 # 50MB in bytes

# Firebase Storage
firebase:
  storage:
    bucket: filesharer-b8ff3

# CloudConvert (PDF→DOCX for PREMIUM users) — set CLOUDCONVERT_API_KEY in .env
cloudconvert:
  api-key: ${CLOUDCONVERT_API_KEY:}
  api-url: https://api.cloudconvert.com/v2

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models
    model: gemini-2.5-flash

# OpenAI Moderation (kiểm duyệt nội dung tài liệu nhóm)
# Để trống api-key → engine chỉ chạy keyword blacklist, bỏ qua tầng AI.
openai:
  moderation:
    api-key: ${OPENAI_API_KEY:}
    api-url: https://api.openai.com/v1/moderations
    model: omni-moderation-latest
    # Ngưỡng score (0-1) để flag PENDING. Score cao hơn → nghiêm khắc hơn.
    threshold: 0.5
    # Số ký tự text tối đa gửi lên OpenAI (cắt đầu file). 0 = không giới hạn.
    max-chars: 8000

# Payment Gateway Configuration
# VNPay: https://sandbox.vnpayment.vn — đăng ký merchant để lấy tmn-code + hash-secret
# MoMo:  https://business.momo.vn — đăng ký để lấy partner-code + access-key + secret-key
payment:
  frontend-return-url: ${PAYMENT_FRONTEND_RETURN_URL:http://localhost:3000/payment/result}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
    version: 2.1.0
    command: pay
    curr-code: VND
    locale: vn
    expire-minutes: 15
  momo:
    partner-code: ${MOMO_PARTNER_CODE:}
    access-key: ${MOMO_ACCESS_KEY:}
    secret-key: ${MOMO_SECRET_KEY:}
    endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
    return-url: ${MOMO_RETURN_URL:http://localhost:8080/api/payments/momo/return}
    ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}
    request-type: captureWallet
    lang: vi

# Logging
logging:
  level:
    com.example.fileshareR: DEBUG
    org.springframework.security: DEBUG
